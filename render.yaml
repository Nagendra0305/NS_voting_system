databases:
  - name: voting-system-db
    databaseName: voting_system
    user: voting_system_user

services:
  - type: web
    name: voting-system-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: voting-system-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app,https://your-custom-domain.com